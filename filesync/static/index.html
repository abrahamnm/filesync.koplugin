    // ===== API =====
    function createApiErrorFromData(data, status, fallbackMessage) {
        var apiError = new Error((data && data.error) || fallbackMessage || t('request_failed') + ' (' + status + ')');
        apiError.code = data && data.code;
        apiError.status = status;
        apiError.retryAfter = data && data.retry_after;
        apiError.sourceType = data && data.source_type;
        apiError.destinationType = data && data.destination_type;
        apiError.destinationPath = data && data.destination_path;
        apiError.canMerge = !!(data && data.can_merge);
        apiError.details = data || {};
        return apiError;
    }

    function createConnectionError() {
        var connectionError = new Error(t('network_error'));
        connectionError.code = 'network_error';
        return connectionError;
    }

    function normalizeRequestError(err) {
        if (!err) {
            return createConnectionError();
        }

        if (err.code === 'network_error') {
            return err;
        }

        if (err.name === 'AbortError') {
            return err;
        }

        var message = String(err.message || '').toLowerCase();
        if (!message
            || message === 'failed to fetch'
            || message === 'load failed'
            || message.indexOf('networkerror') !== -1
            || message.indexOf('fetch') !== -1) {
            return createConnectionError();
        }

        return err;
    }

    async function api(method, url, body, options) {
        options = options || {};
        var opts = { method: method };
        if (body instanceof FormData) {
            opts.body = body;
        } else if (body) {
            opts.headers = { 'Content-Type': 'application/json' };
            opts.body = JSON.stringify(body);
        }
        var res;
        try {
            res = await fetch(url, opts);
        } catch (err) {
            throw normalizeRequestError(err);
        }
        var text = await res.text();
        var data;
        try {
            data = JSON.parse(text);
        } catch (e) {
            throw new Error(res.ok ? t('invalid_server_response') : t('server_error') + ' (' + res.status + ')');
        }
        if (!res.ok || data.error) {
            var apiError = createApiErrorFromData(data, res.status, t('request_failed') + ' (' + res.status + ')');
            if (apiError.code === 'auth_session_invalid' && options.handleAuthInvalid !== false) {
                apiError.handled = true;
                await recoverFromExpiredAuthSession();
            }
            throw apiError;
        }
        return data;
    }

    function isAuthSessionInvalidError(err) {
        return !!(err && err.code === 'auth_session_invalid');
    }

    async function recoverFromExpiredAuthSession() {
        if (authSessionRecoveryPromise) {
            return authSessionRecoveryPromise;
        }

        authSessionRecoveryPromise = (async function() {
            var shouldRefresh = rootUnlocked || currentScope === 'system' || showHiddenFiles || canShowHidden || !!currentDetailEntry;
            rootUnlocked = false;
            authRequestPending = false;
            showHiddenFiles = false;
            updateAuthUI();

            if (!shouldRefresh) {
                updateNavigationContextUI();
                updateParentNav();
                return;
            }

            try {
                await refreshAfterAuthModeChange();
            } catch (_err) {
                // Keep the UI in safe mode even if the refresh fails.
            }
        })();

        try {
            return await authSessionRecoveryPromise;
        } finally {
            authSessionRecoveryPromise = null;
        }
    }

    function setAvailableScopes(scopes) {
        availableScopes = [];
        if (!Array.isArray(scopes)) return;
        for (var i = 0; i < scopes.length; i++) {
            var scope = scopes[i];
            if (!scope || !scope.id) continue;
            availableScopes.push({
                id: String(scope.id),
                label: scope.label || scope.root_path || String(scope.id),
                rootPath: scope.root_path || scope.label || String(scope.id)
            });
        }
    }

    function getScopeById(scopeId) {
        for (var i = 0; i < availableScopes.length; i++) {
            if (availableScopes[i].id === scopeId) {
                return availableScopes[i];
            }
        }
        return null;
    }

    function normalizeAbsolutePath(path) {
        var normalized = String(path || '/').replace(/\/+/g, '/');
        if (!normalized || normalized === '') {
            normalized = '/';
        }
        if (normalized.charAt(0) !== '/') {
            normalized = '/' + normalized;
        }
        if (normalized.length > 1 && normalized.charAt(normalized.length - 1) === '/') {
            normalized = normalized.slice(0, -1);
        }
        return normalized || '/';
    }

    function toRootScopePath(path) {
        if (currentScope === 'system') {
            return normalizeAbsolutePath(path);
        }
        var relativePath = String(path || '/');
        if (relativePath === '/') {
            return normalizeAbsolutePath(rootStartPath || safeRootPath || '/mnt/us');
        }
        return normalizeAbsolutePath((safeRootPath || '/mnt/us') + '/' + relativePath.replace(/^\/+/, ''));
    }

    function toSafeScopePath(path) {
        var normalized = normalizeAbsolutePath(path);
        var safeRoot = normalizeAbsolutePath(safeRootPath || '/mnt/us');

        if (safeRoot === '/') {
            return normalized;
        }
        if (normalized === safeRoot) {
            return '/';
        }
        if (normalized.indexOf(safeRoot + '/') === 0) {
            return normalized.slice(safeRoot.length) || '/';
        }
        return '/';
    }

    function ensureNavigationState() {
        if (!defaultScope) {
            defaultScope = 'storage';
        }
        if (!currentScope) {
            currentScope = defaultScope;
        }
        if (!getScopeById(currentScope)) {
            currentScope = defaultScope;
        }
        if (!getScopeById(currentScope) && availableScopes.length > 0) {
            currentScope = availableScopes[0].id;
        }
        if (!canShowHidden) {
            showHiddenFiles = false;
        }
    }

    function updateNavigationContextFromResponse(data) {
        if (!data) return;
        if (data.default_scope) {
            defaultScope = String(data.default_scope);
        }
        if (Array.isArray(data.available_scopes)) {
            setAvailableScopes(data.available_scopes);
        }
        if (typeof data.can_show_hidden === 'boolean') {
            canShowHidden = data.can_show_hidden;
        }
        if (data.safe_root_path) {
            safeRootPath = String(data.safe_root_path);
        }
        if (data.root_start_path) {
            rootStartPath = String(data.root_start_path);
        }
        if (data.scope) {
            currentScope = String(data.scope);
        }
        if (typeof data.include_hidden === 'boolean') {
            showHiddenFiles = !!data.include_hidden;
        }
        if (!rootUnlocked) {
            canShowHidden = false;
            showHiddenFiles = false;
        }
        ensureNavigationState();
        updateNavigationContextUI();
    }

    function getScopeRoutePrefix(scope) {
        return scope === 'system' ? '/system' : '/files';
    }

    function encodeRoutePath(path) {
        var normalizedPath = path || '/';
        if (normalizedPath === '/') {
            return '/';
        }

        var segments = normalizedPath.replace(/^\/+|\/+$/g, '').split('/');
        var encodedSegments = [];
        for (var i = 0; i < segments.length; i++) {
            if (segments[i]) {
                encodedSegments.push(encodeURIComponent(segments[i]));
            }
        }

        return encodedSegments.length ? '/' + encodedSegments.join('/') + '/' : '/';
    }

    function decodeRoutePath(routePath) {
        if (!routePath || routePath === '/') {
            return '/';
        }

        var segments = routePath.replace(/^\/+|\/+$/g, '').split('/');
        var decodedSegments = [];
        for (var i = 0; i < segments.length; i++) {
            if (!segments[i]) continue;
            try {
                decodedSegments.push(decodeURIComponent(segments[i]));
            } catch (e) {
                decodedSegments.push(segments[i]);
            }
        }

        return decodedSegments.length ? '/' + decodedSegments.join('/') : '/';
    }

    function buildHistoryURL(path, scope, detail) {
        var resolvedScope = scope || currentScope || defaultScope || 'storage';
        if (detail) {
            var detailPath = path || '/';
            var parentPath = getParentPath(detailPath);
            var detailName = getPathName(detailPath);
            var detailParams = new URLSearchParams();
            if (detailName) {
                detailParams.set('detail', detailName);
            }
            return getScopeRoutePrefix(resolvedScope) + encodeRoutePath(parentPath)
                + (detailParams.toString() ? '?' + detailParams.toString() : '');
        }

        return getScopeRoutePrefix(resolvedScope) + encodeRoutePath(path || '/');
    }

    function normalizeNavigationTarget(path, scope, detail) {
        ensureNavigationState();

        var requestedScope = scope || currentScope || defaultScope || 'storage';
        var scopeAvailable = !!getScopeById(requestedScope);
        var normalizedScope = scopeAvailable ? requestedScope : (defaultScope || 'storage');
        var normalizedPath = path || '/';
        var normalizedDetail = !!detail;

        if (requestedScope !== normalizedScope) {
            normalizedPath = '/';
            normalizedDetail = false;
            showHiddenFiles = false;
        }

        return {
            path: normalizedPath,
            scope: normalizedScope,
            detail: normalizedDetail
        };
    }

    function replaceCurrentHistoryState(detail) {
        history.replaceState(
            { path: currentPath, scope: currentScope, detail: !!detail },
            '',
            buildHistoryURL(currentPath, currentScope, detail)
        );
    }

    // ===== Navigation =====
    // Internal navigation: sets state and loads files WITHOUT pushing history
    function _navigateInternal(path, scope) {
        path = path || '/';
        scope = scope || currentScope || defaultScope || 'storage';
        cancelPendingLongPress();
        if (currentPath !== path || currentScope !== scope) {
            selectionMode = false;
            selectedPaths = [];
            updateSelectionUI();
        }
        closeUploadZone();
        currentScope = scope;
        currentPath = path;
        currentFilter = '';
        document.getElementById('searchInput').value = '';
        ensureNavigationState();
        updateNavigationContextUI();
        updateParentNav();
        loadFiles();
    }

    // Public navigate: updates state and pushes a history entry
    window.navigate = function(path, scope) {
        path = path || '/';
        scope = scope || currentScope || defaultScope || 'storage';
        _navigateInternal(path, scope);
        var nextURL = buildHistoryURL(path, scope, false);
        if ((window.location.pathname + window.location.search) !== nextURL) {
            history.pushState({ path: path, scope: scope }, '', nextURL);
        }
    };

    async function loadFiles() {
        var list = document.getElementById('fileList');
        list.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">' + escapeHtml(t('loading')) + '</div></div>';

        try {
            var params = new URLSearchParams({
                path: currentPath,
                scope: currentScope,
                sort: currentSort,
                order: currentOrder,
                filter: currentFilter
            });
            if (showHiddenFiles && canShowHidden) {
                params.set('hidden', '1');
            }
            var data = await api('GET', '/api/files?' + params);
            if (data && typeof data.path === 'string') {
                currentPath = data.path;
            }
            updateNavigationContextFromResponse(data);
            updateParentNav();
            renderBreadcrumbs(data.breadcrumbs);
            renderFiles(data.entries);
        } catch (err) {
            if (isAuthSessionInvalidError(err) && err.handled) {
                return;
            }
            list.innerHTML = '<div class="empty-state">' + icons.empty +
                '<div class="empty-state-text">' + escapeHtml(t('failed_to_load')) + '</div>' +
                '<div class="empty-state-sub">' + escapeHtml(err.message) + '</div></div>';
            showToast(err.message, 'error');
        }
    }

        for (var i = 0; i < crumbs.length; i++) {

            var isLast = i === crumbs.length - 1;
            var displayName = crumbs[i].name;

            var attrs = isLast ? '' : ' onclick="navigate(\'' + escapeAttr(crumbs[i].path) + '\')"';
            if (displayName === "Home") {
                classes += ' breadcrumb-home';
                attrs += ' title="' + escapeHtml(t('home')) + '" aria-label="' + escapeHtml(t('home')) + '"';
                html += '<span class="' + classes + '"' + attrs + '>' +
                    '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><path d="M10 20v-6h4v6"/></svg>' +
                    '</span>';

            html += '<span class="' + classes + '"' + attrs + '>' + escapeHtml(displayName) + '</span>';

    function isFileActionTarget(target) {
        return !!(target && target.closest && target.closest('.file-actions'));
    }

    function clearSuppressedSelectionClick() {
        suppressNextSelectionClick = null;
    }

    function shouldSuppressSelectionClick(path) {
        if (!suppressNextSelectionClick) return false;
        if (suppressNextSelectionClick.path !== path) return false;
        if (Date.now() > suppressNextSelectionClick.expiresAt) {
            clearSuppressedSelectionClick();
            return false;
        }
        clearSuppressedSelectionClick();
        return true;
    }

    function cancelPendingLongPress() {
        if (!longPressState) return;
        clearTimeout(longPressState.timer);
        longPressState = null;
    }

    function enterSelectionModeFromLongPress(path) {
        cancelPendingLongPress();
        clearSuppressedSelectionClick();
        suppressNextSelectionClick = {
            path: path,
            expiresAt: Date.now() + 350
        };
        selectionMode = true;
        selectedPaths = [path];
        closeUploadZone();
        updateSelectionUI();
        renderFiles(currentEntries);
        if (navigator.vibrate) {
            navigator.vibrate(12);
        }
    }

    function matchesLongPressPointer(event) {
        return !!(longPressState && event && event.pointerId === longPressState.pointerId);
    }

    window.handleFilePointerDown = function(event, path) {
        if (selectionMode || !event) return;
        if (event.pointerType === 'mouse') return;
        if (event.button !== undefined && event.button !== 0) return;
        if (isFileActionTarget(event.target)) return;

        cancelPendingLongPress();
        longPressState = {
            pointerId: event.pointerId,
            path: path,
            startX: event.clientX,
            startY: event.clientY,
            timer: setTimeout(function() {
                enterSelectionModeFromLongPress(path);
            }, LONG_PRESS_DURATION)
        };
    };

    window.handleFilePointerMove = function(event) {
        if (!matchesLongPressPointer(event)) return;

        var dx = Math.abs(event.clientX - longPressState.startX);
        var dy = Math.abs(event.clientY - longPressState.startY);
        if (dx > LONG_PRESS_MOVE_TOLERANCE || dy > LONG_PRESS_MOVE_TOLERANCE) {
            cancelPendingLongPress();
        }
    };

    window.handleFilePointerEnd = function(event) {
        if (!matchesLongPressPointer(event)) return;
        cancelPendingLongPress();
    };

    window.handleFilePointerCancel = function(event) {
        if (!longPressState) return;
        if (event && event.pointerId !== undefined && event.pointerId !== longPressState.pointerId) return;
        cancelPendingLongPress();
    };

    window.handleFileContextMenu = function(event, path) {
        if (shouldSuppressSelectionClick(path)) {
            event.preventDefault();
            suppressNextSelectionClick = {
                path: path,
                expiresAt: Date.now() + 200
            };
        }
    };

    function renderFiles(entries) {
        currentEntries = entries || [];
        syncSelectedPaths(currentEntries);
        var list = document.getElementById('fileList');

    async function deleteEntries(entries, deleteSdr) {
        var deletedCount = 0;
        var failures = [];

        for (var i = 0; i < entries.length; i++) {
            var entry = entries[i];
            try {
                var body = { path: entry.path };
                body.scope = currentScope;
                if (entry.is_dir && !entry.is_empty) {
                    body.recursive = true;
                }
                if (deleteSdr && !entry.is_dir && entry.has_sdr) {
                    body.delete_sdr = true;
                }
                await api('POST', '/api/delete', body);
                deletedCount++;
            } catch (err) {
                failures.push(entry.name + ': ' + err.message);
            }
        }

        return {
            deletedCount: deletedCount,
            failures: failures
        };
    }

    function confirmDeleteEntries(entries, onSuccess) {
        if (!entries || !entries.length) return;

        if (!canDeleteEntriesInCurrentMode(entries)) {
            showToast(t('root_required_delete'), 'error');
            return;
        }

        var singleEntry = entries.length === 1 ? entries[0] : null;
        var isRecursiveDirDelete = !!(singleEntry && singleEntry.is_dir && !singleEntry.is_empty);
        var hasRecursiveDelete = entries.some(requiresRootForRecursiveDelete);
        var titleStr = singleEntry
            ? (singleEntry.is_dir
                ? (singleEntry.is_empty ? t('delete_empty_folder') : t('delete_folder'))
                : t('delete_file'))
            : t('delete_selected');
        var msgStr = singleEntry
            ? (t('confirm_delete') + ' "' + escapeHtml(singleEntry.name) + '"?'
                + (isRecursiveDirDelete ? ' ' + t('confirm_delete_contents') : ''))
            : (t('confirm_delete_selected').replace('{count}', entries.length)
                + (hasRecursiveDelete ? ' ' + t('confirm_delete_contents') : ''));
        var showSdrCheckbox = !!(singleEntry && !singleEntry.is_dir && singleEntry.has_sdr);

        showConfirm(
            titleStr,
            msgStr,
            t('delete_label'),
            async function() {
                var deleteSdr = showSdrCheckbox && document.getElementById('confirmSdrCheckbox').checked;
                var result = await deleteEntries(entries, deleteSdr);

                if (result.failures.length === 0) {
                    showToast(t('deleted_successfully'), 'success');
                    if (onSuccess) onSuccess();
                    return;
                }

                if (result.deletedCount > 0 && onSuccess) {
                    onSuccess();
                }
                showToast(t('delete_failed') + ' ' + result.failures[0], 'error');
            },
            showSdrCheckbox
        );
    }

    function isSafeUploadFilename(filename) {
        if (!filename) return false;
        var lowerName = String(filename).toLowerCase();
        var parts = lowerName.split('.');
        if (parts.length < 2) return false;

        if (parts.length >= 3) {
            var compoundExt = parts.slice(-2).join('.');
            if (safeExtensions[compoundExt]) {
                return true;
            }
        }

        return !!safeExtensions[parts[parts.length - 1]];
    }

            hasRootPin = !!status.has_root_pin;
            if (status && status.root_pin_length) {
                rootPinExpectedLength = Math.max(4, Number(status.root_pin_length) || 4);

            rootUnlocked = !!status.root_unlocked;
            setSafeExtensions(status && status.safe_extensions);
            updateNavigationContextFromResponse(status);

            if (rootUnlocked) {
                currentPath = currentScope === 'system'
                    ? normalizeAbsolutePath(currentPath)
                    : toRootScopePath(currentPath);
                currentScope = 'system';
            } else {
                if (currentScope === 'system') {
                    currentPath = toSafeScopePath(currentPath);
                    currentScope = 'storage';
                }
                showHiddenFiles = false;

            rootUnlocked = false;
            hasRootPin = false;
            rootPinExpectedLength = 4;

            setAvailableScopes([]);
            safeRootPath = '/mnt/us';

                var seconds = err.retryAfter || 5;
                setRootPinError(t('root_pin_throttled').replace('{seconds}', seconds));
                updateRootPinDots('', true);

                hideRootPinModal();
                showToast(t('root_pin_missing'), 'error');
            } else {
                setRootPinError(err.message || t('request_failed'));

            confirmBtn.disabled = false;
            handleRootPinInput();
            updateAuthUI();

    function getPathName(path) {

        var normalized = path.replace(/\/+$/, '') || '/';
        if (normalized === '/') return '';

        return slashIndex === -1 ? normalized : normalized.substring(slashIndex + 1);

    async function executeClipboardOperation(operation, conflictState) {
        var endpoint = operation.mode === 'cut' ? '/api/move' : '/api/copy';
        var completedPaths = [];
        var failures = [];
        var skippedPaths = [];
        var remainingPaths = [];

        for (var i = 0; i < operation.paths.length; i++) {
            if (conflictState && conflictState.cancelled) {
                remainingPaths = operation.paths.slice(i);
                break;
            }

            var sourcePath = operation.paths[i];
            var entryName = getPathName(sourcePath);
            var destinationPath = buildChildPath(operation.destination, entryName);
            var conflictStrategy = normalizeConflictAction(conflictState && conflictState.action, null);

            while (true) {
                try {
                    await api('POST', endpoint, {
                        old_path: sourcePath,
                        new_path: destinationPath,
                        old_scope: operation.sourceScope,
                        new_scope: operation.destinationScope,
                        conflict_strategy: conflictStrategy
                    });
                    completedPaths.push(sourcePath);
                    break;
                } catch (err) {
                    if (err.code === 'destination_exists') {
                        var autoAction = normalizeConflictAction(conflictState && conflictState.action, err);
                        if (autoAction === 'skip') {
                            skippedPaths.push(sourcePath);
                            break;
                        }
                        if (autoAction === 'replace' || autoAction === 'merge_replace') {
                            conflictStrategy = autoAction;
                            continue;
                        }

                        var decision = await requestConflictResolution(err, entryName);
                        var chosenAction = normalizeConflictAction(decision.action, err);
                        if (decision.applyToAll && chosenAction !== 'cancel') {
                            conflictState.action = chosenAction;
                        }

                        if (chosenAction === 'cancel') {
                            if (conflictState) {
                                conflictState.cancelled = true;
                                remainingPaths = operation.paths.slice(i);
                            }
                            break;
                        }

                        if (chosenAction === 'skip') {
                            skippedPaths.push(sourcePath);
                            break;
                        }

                        conflictStrategy = chosenAction;
                        continue;
                    }

                    failures.push({
                        path: sourcePath,
                        error: err.message
                    });
                    break;
                }
            }

            if (conflictState && conflictState.cancelled) {
                if (remainingPaths.length === 0) {
                    remainingPaths = operation.paths.slice(i);
                }
                break;
            }
        }

        return {
            completedPaths: completedPaths,
            failures: failures,
            skippedPaths: skippedPaths,
            remainingPaths: remainingPaths,
            cancelled: !!(conflictState && conflictState.cancelled)
        };
    }

    function updateSelectionUI() {

        var copyBtn = document.getElementById('btnSelectionCopy');
        var cutBtn = document.getElementById('btnSelectionCut');
        var deleteBtn = document.getElementById('btnSelectionDelete');
        var hasSelection = selectedPaths.length > 0;
        var selectedEntries = getSelectedEntries();
        var canDeleteSelected = hasSelection && canDeleteEntriesInCurrentMode(selectedEntries);
        var canDownloadSelected = hasSelection && selectedEntries.some(function(entry) {
            return entry && !entry.is_dir;
        });
        var hasSelectedDir = selectedEntries.some(function(entry) {
            return entry && entry.is_dir;
        });
        var showBar = selectionMode;

        if (selectBtn) {
            selectBtn.classList.toggle('active', selectionMode);
            selectBtn.setAttribute('aria-pressed', selectionMode ? 'true' : 'false');
        }

        if (selectionCount) {
            selectionCount.textContent = String(selectedPaths.length);
            selectionCount.setAttribute('aria-label', t('selected_label') + ': ' + selectedPaths.length);
        }

        if (selectionBar) {
            selectionBar.classList.toggle('visible', showBar);
        }

        document.body.classList.toggle('selection-mode-active', selectionMode);

        if (downloadBtn) {
            downloadBtn.disabled = !canDownloadSelected;
            downloadBtn.title = hasSelectedDir && !canDownloadSelected
                ? t('folder_download_unavailable')
                : t('download');
        }
        if (copyBtn) {
            copyBtn.hidden = !canUseRootActions();
            copyBtn.disabled = !hasSelection || !canUseRootActions();
            copyBtn.title = canUseRootActions() ? t('copy') : t('root_required_clipboard');
        }
        if (cutBtn) {
            cutBtn.hidden = !canUseRootActions();
            cutBtn.disabled = !hasSelection || !canUseRootActions();
            cutBtn.title = canUseRootActions() ? t('cut') : t('root_required_clipboard');
        }
        if (deleteBtn) {
            deleteBtn.hidden = !canUseRootActions();
            deleteBtn.disabled = !canUseRootActions() || !canDeleteSelected;
            deleteBtn.title = !canUseRootActions()
                ? t('root_required_delete')
                : (!hasSelection ? t('delete_label') : (canDeleteSelected ? t('delete_label') : t('root_required_delete')));
        }
    }

    window.downloadSelectedItems = function() {
        if (!selectedPaths.length) return;
        var entries = getSelectedEntries();
        if (!entries.length) return;

        var downloadableEntries = entries.filter(function(entry) {
            return entry && !entry.is_dir;
        });

        if (!downloadableEntries.length) {
            showToast(t('folder_download_unavailable'), 'error');
            return;
        }

        for (var i = 0; i < downloadableEntries.length; i++) {
            downloadFile(downloadableEntries[i].path);
        }

        if (downloadableEntries.length !== entries.length) {
            showToast(t('folder_download_unavailable'), 'error');
        }

    window.pasteClipboardItems = async function() {
        if (!hasClipboardItems()) return;
        if (!canUseRootActions()) {
            showToast(t('root_required_clipboard'), 'error');
            return;
        }
        var operation = {
            mode: clipboardState.mode,
            paths: clipboardState.paths.slice(),
            sourceScope: clipboardState.scope || defaultScope,
            destinationScope: currentScope,
            destination: currentPath
        };

        var conflictState = { action: null, cancelled: false };
        var result = await executeClipboardOperation(operation, conflictState);

        if (operation.mode === 'cut') {
            if (result.failures.length > 0 || result.skippedPaths.length > 0 || result.remainingPaths.length > 0) {
                var pendingPaths = result.failures.map(function(item) {
                    return item.path;
                }).concat(result.skippedPaths, result.remainingPaths);
                setClipboard('cut', pendingPaths, operation.sourceScope);
            } else {
                clearClipboard();
            }
        }

        if (result.completedPaths.length > 0) {
            await loadFiles();
        }

        if (result.failures.length > 0) {
            showToast(t('paste_failed') + ' ' + result.failures[0].error, 'error');
            return;
        }

        if (result.completedPaths.length > 0) {
            showToast(t('paste_success').replace('{count}', result.completedPaths.length), 'success');
        }
        if (result.skippedPaths.length > 0) {
            showToast(t('skipped_count').replace('{count}', result.skippedPaths.length), 'info');
        }
    };

    // ===== File Detail View =====
    // Internal detail show: renders the detail view WITHOUT pushing history
    function _showDetailInternal(path) {
        cancelPendingLongPress();
        var entry = null;
        for (var i = 0; i < currentEntries.length; i++) {
            if (currentEntries[i].path === path) {
                entry = currentEntries[i];
                break;
            }
        }
        if (!entry) return;
        closeUploadZone();
        currentDetailEntry = entry;

        var detail = document.getElementById('fileDetail');
        var coverEl = document.getElementById('detailCover');
        var titleEl = document.getElementById('detailTitle');
        var authorEl = document.getElementById('detailAuthor');
        var infoEl = document.getElementById('detailInfo');
        var actionsEl = document.getElementById('detailActions');

        // Show the detail overlay and lock body scroll (iOS needs position:fixed)
        detail.classList.add('open');
        detail.style.display = 'block';
        document.body.dataset.scrollY = window.scrollY;
        document.body.style.position = 'fixed';
        document.body.style.top = '-' + window.scrollY + 'px';
        document.body.style.left = '0';
        document.body.style.right = '0';
        document.body.style.overflow = 'hidden';

        // Determine if this is an image file
        var imageExts = {jpg:1, jpeg:1, png:1, gif:1, webp:1};
        var fileExt = (entry.name.split('.').pop() || '').toLowerCase();
        var isImage = imageExts[fileExt] === 1;

        var imagePreviewEl = document.getElementById('detailImagePreview');

        if (isImage) {
            // Show image preview, hide book cover
            coverEl.style.display = 'none';
            imagePreviewEl.style.display = 'flex';
            imagePreviewEl.innerHTML = '<div class="cover-spinner"></div>';
            var previewImg = document.createElement('img');
            previewImg.src = '/api/download?path=' + encodeURIComponent(path) + '&preview=1';
            previewImg.src += '&scope=' + encodeURIComponent(currentScope);
            previewImg.alt = t('image_preview');
            previewImg.onload = function() {
                imagePreviewEl.innerHTML = '';
                imagePreviewEl.appendChild(previewImg);
            };
            previewImg.onerror = function() {
                imagePreviewEl.innerHTML = buildCoverPlaceholder('image');
            };
        } else {
            // Hide image preview, show book cover
            imagePreviewEl.style.display = 'none';
            imagePreviewEl.innerHTML = '';
            coverEl.style.display = '';
            // Show loading spinner in cover area
            coverEl.innerHTML = '<div class="cover-spinner"></div>';
        }

        // Set title from filename (without extension)
        var nameWithoutExt = entry.name.replace(/\.[^.]+$/, '') || entry.name;
        titleEl.textContent = nameWithoutExt;

        // Clear author initially
        authorEl.textContent = '';
        authorEl.style.display = 'none';

        // File type info
        var typeClass = resolveEntryTypeClass(entry);
        var extMatch = entry.name.match(/\.([^.]+)$/);
        var ext = extMatch ? extMatch[1].toUpperCase() : t('unknown');
        var dateStr = entry.modified ? formatDate(entry.modified) : t('unknown');
        var sizeStr = entry.size_formatted || '0 B';

        var infoHtml = '';
        infoHtml += '<div class="detail-info-row"><span class="detail-info-label">' + escapeHtml(t('file_type')) + '</span><span class="detail-info-value">' + escapeHtml(ext) + '</span></div>';
        infoHtml += '<div class="detail-info-row"><span class="detail-info-label">' + escapeHtml(t('size')) + '</span><span class="detail-info-value">' + escapeHtml(sizeStr) + '</span></div>';
        infoHtml += '<div class="detail-info-row"><span class="detail-info-label">' + escapeHtml(t('modified')) + '</span><span class="detail-info-value">' + escapeHtml(dateStr) + '</span></div>';
        infoEl.innerHTML = infoHtml;

        // Build action buttons
        var actHtml = '';
        actHtml += '<button class="btn btn-primary" onclick="detailDownload()">' + icons.download + '<span>' + escapeHtml(t('download')) + '</span></button>';
        actHtml += '<button class="btn btn-secondary" onclick="detailEdit()">' + icons.rename + '<span>' + escapeHtml(t('edit')) + '</span></button>';
        if (canUseRootActions()) {
            actHtml += '<button class="btn btn-danger" onclick="detailDelete()">' + icons.trash + '<span>' + escapeHtml(t('delete_label')) + '</span></button>';
        }
        actionsEl.innerHTML = actHtml;

        // For image files, skip metadata fetch (no book metadata to show)
        if (isImage) {
            coverEl.innerHTML = '';
            coverEl.style.display = 'none';
        } else {
            // Fetch metadata asynchronously for non-image files
            api('GET', '/api/metadata?path=' + encodeURIComponent(path) + '&scope=' + encodeURIComponent(currentScope))
                .then(function(meta) {
                    if (!currentDetailEntry || currentDetailEntry.path !== path) return;

                    // Update title if metadata has one
                    if (meta.title) {
                        titleEl.textContent = meta.title;
                    }

                    // Show author if available
                    if (meta.author) {
                        authorEl.textContent = meta.author;
                        authorEl.style.display = 'block';
                    }

                    // Handle cover image
                    if (meta.has_cover) {
                        var img = document.createElement('img');
                        img.src = '/api/cover?path=' + encodeURIComponent(path) + '&scope=' + encodeURIComponent(currentScope);
                        img.alt = t('book_cover');
                        img.onerror = function() {
                            coverEl.innerHTML = buildCoverPlaceholder(typeClass);
                        };
                        coverEl.innerHTML = '';
                        coverEl.appendChild(img);
                    } else {
                        coverEl.innerHTML = buildCoverPlaceholder(typeClass);
                    }
                })
                .catch(function(err) {
                    if (isAuthSessionInvalidError(err) && err.handled) return;
                    if (!currentDetailEntry || currentDetailEntry.path !== path) return;
                    coverEl.innerHTML = buildCoverPlaceholder(typeClass);
                });
        }
    }

    window.detailRename = function() {
        if (!currentDetailEntry) return;
        var entry = currentDetailEntry;
        var fullName = entry.name;
        var dotIndex = fullName.lastIndexOf('.');
        var namePart = dotIndex > 0 ? fullName.substring(0, dotIndex) : fullName;
        var extPart = dotIndex > 0 ? fullName.substring(dotIndex) : '';

        // Show the modal with extension suffix
        var overlay = document.getElementById('modalOverlay');
        var titleElem = document.getElementById('modalTitle');
        var inputElem = document.getElementById('modalInput');

        titleElem.textContent = t('rename');
        setModalConfirmButton(t('rename'));

        // Wrap input with extension suffix
        var inputParent = inputElem.parentNode;
        var hasExtWrapper = inputParent.classList.contains('modal-input-with-ext');
        if (extPart) {
            if (!hasExtWrapper) {
                var wrapper = document.createElement('div');
                wrapper.className = 'modal-input-with-ext';
                inputParent.insertBefore(wrapper, inputElem);
                wrapper.appendChild(inputElem);
                var extSpan = document.createElement('span');
                extSpan.className = 'detail-ext-suffix';
                extSpan.id = 'modalExtSuffix';
                wrapper.appendChild(extSpan);
            }
            document.getElementById('modalExtSuffix').textContent = extPart;
        } else if (hasExtWrapper) {
            // Remove the wrapper if no extension
            var wrapper2 = inputParent;
            var grandParent = wrapper2.parentNode;
            grandParent.insertBefore(inputElem, wrapper2);
            wrapper2.remove();
        }

        inputElem.value = namePart;
        overlay.classList.add('open');
        setTimeout(function() {
            inputElem.focus();
            inputElem.select();
        }, 100);

        modalCallback = async function(newName) {
            if (!newName || (newName + extPart) === fullName) {
                restoreModalInput();
                return;
            }
            var finalName = newName + extPart;
            try {
                var parentPath = entry.path.substring(0, entry.path.lastIndexOf('/')) || '/';
                var newPath = parentPath + '/' + finalName;
                await api('POST', '/api/rename', { old_path: entry.path, new_path: newPath, scope: currentScope });
                showToast(t('renamed_successfully'), 'success');
                restoreModalInput();
                _hideDetailInternal();
                replaceCurrentHistoryState(false);
                loadFiles();
            } catch (err) {
                showToast(t('rename_failed') + ' ' + err.message, 'error');
                restoreModalInput();
            }
        };
    };

    function restoreModalInput() {
        var inputElem = document.getElementById('modalInput');

        if (inputParent.classList.contains('modal-input-with-ext')) {
            var grandParent = inputParent.parentNode;
            grandParent.insertBefore(inputElem, inputParent);
            inputParent.remove();
        }
    }

    async function processSelectedUploads(files, preserveRelativePath) {
        if (!files || files.length === 0) return;
        var conflictState = { action: null, cancelled: false };
        var uploadedCount = 0;
        var skippedCount = 0;
        var failedCount = 0;
        var batchId = null;
        var batchLabel = null;
        var batchState = null;

        if (preserveRelativePath) {
            batchLabel = getFolderUploadLabel(files);
            batchId = createUploadProgressItem(batchLabel, 'dir');
            batchState = {
                totalBytes: 0,
                completedBytes: 0
            };
            for (var bi = 0; bi < files.length; bi++) {
                batchState.totalBytes += files[bi].size || 0;
            }
        }

        for (var fi = 0; fi < files.length; fi++) {
            if (conflictState.cancelled) {
                break;
            }
            var file = files[fi];
            var relativePath = preserveRelativePath ? (file.webkitRelativePath || '') : '';
            var displayName = relativePath || file.name;
            if (!canUseRootActions() && !isSafeUploadFilename(file.name)) {
                showToast(displayName + ': ' + t('root_required_upload'), 'error');
                continue;
            }
            var uploadResult = await uploadFile({
                file: file,
                relativePath: relativePath,
                displayName: displayName,
            }, conflictState, batchState ? {
                progressId: batchId,
                batchState: batchState,
                suppressSuccessToast: true,
                suppressErrorToast: true,
            } : null);
            if (uploadResult === 'uploaded') {
                uploadedCount++;
            } else if (uploadResult === 'skipped') {
                skippedCount++;
            } else if (uploadResult === 'failed') {
                failedCount++;
            }
        }

        if (batchId) {
            if (conflictState.cancelled) {
                updateUploadProgressState(batchId, 'cancelled', 'info', 'skipped');
            } else if (failedCount > 0) {
                updateUploadProgressState(batchId, 'failed', 'error', 'error');
            } else if (uploadedCount > 0) {
                updateUploadProgressState(batchId, 'done', 'success', 'complete');
                showToast(batchLabel + ' ' + t('uploaded'), 'success');
            } else if (skippedCount > 0) {
                updateUploadProgressState(batchId, 'skipped', 'info', 'skipped');
            }

            setTimeout(function() {
                var el = document.getElementById(batchId);
                if (el) el.remove();
            }, conflictState.cancelled ? 1200 : 3000);
        }

        if (uploadedCount > 0) {
            loadFiles();
        }
        if (!batchId && uploadedCount > 0) {
            // Per-file uploads already showed their own success feedback.
        }
        if (skippedCount > 0) {
            showToast(t('skipped_count').replace('{count}', skippedCount), 'info');
        }
        if (batchId && failedCount > 0) {
            showToast(t('upload_failed') + ' ' + batchLabel, 'error');
        }
        if (!conflictState.cancelled && failedCount === 0 && skippedCount === 0 && uploadedCount > 0) {
            closeUploadZone();
        }
    }

    window.handleFileSelect = function(files) {

    function getUploadProgressTypeClass(file, relativePath, isDirectory) {
        if (isDirectory) return 'dir';
        var sourceName = relativePath || (file && file.name) || '';
        var leafName = sourceName.split('/').pop() || sourceName;
        return getTypeClassFromFilename(leafName) || 'file';
    }

    function createUploadProgressItem(displayName, typeClass) {
        var container = document.getElementById('uploadProgress');
        var id = 'upload-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8);
        var item = document.createElement('div');
        var resolvedTypeClass = typeClass || 'file';
        var icon = icons[resolvedTypeClass] || icons.file;
        item.className = 'upload-item';
        item.id = id;
        item.innerHTML = '<div class="upload-item-main">' +
            '<span class="upload-item-icon ' + resolvedTypeClass + '" aria-hidden="true">' + icon + '</span>' +
            '<span class="upload-item-name">' + escapeHtml(displayName) + '</span>' +
            '</div>' +
            '<div class="progress-bar"><div class="progress-bar-fill" id="' + id + '-bar"></div></div>' +
            '<span class="upload-item-status" id="' + id + '-status">0%</span>';
        container.prepend(item);
        return id;
    }

    function setUploadProgressPercent(id, pct) {
        var bar = document.getElementById(id + '-bar');
        var status = document.getElementById(id + '-status');
        var safePct = Math.max(0, Math.min(100, Math.round(Number(pct) || 0)));
        if (bar) {
            bar.style.width = safePct + '%';
            bar.classList.remove('complete', 'error', 'skipped');
        }
        if (status) {
            status.textContent = safePct + '%';
            status.classList.remove('success', 'error', 'info');
        }
    }

    function getFolderUploadLabel(files) {
        var roots = [];
        var seen = Object.create(null);
        for (var i = 0; i < files.length; i++) {
            var relativePath = files[i].webkitRelativePath || files[i].name || '';
            var rootName = relativePath.split('/')[0];
            if (rootName && !seen[rootName]) {
                seen[rootName] = true;
                roots.push(rootName);
            }
        }

        if (roots.length === 1) {
            return roots[0];
        }

        return t('folder_label') + ' (' + roots.length + ')';
    }

    function updateUploadProgressState(id, statusKey, className, barClassName) {
        var bar = document.getElementById(id + '-bar');
        var status = document.getElementById(id + '-status');
        if (bar) {
            bar.style.width = '100%';
            bar.classList.remove('complete', 'error', 'skipped');
            if (barClassName) {
                bar.classList.add(barClassName);
            }
        }
        if (status) {
            status.textContent = t(statusKey);
            status.classList.remove('success', 'error', 'info');
            if (className) {
                status.classList.add(className);
            }
        }
    }

    function sendUploadRequest(id, file, relativePath, conflictStrategy, progressCallback) {
        return new Promise(function(resolve, reject) {
            var formData = new FormData();
            formData.append('file', file);
            if (relativePath) {
                formData.append('relative_path', relativePath);
            }
            if (conflictStrategy) {
                formData.append('conflict_strategy', conflictStrategy);
            }

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload?path=' + encodeURIComponent(currentPath) + '&scope=' + encodeURIComponent(currentScope));

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    if (typeof progressCallback === 'function') {
                        progressCallback(e.loaded, e.total);
                    } else {
                        setUploadProgressPercent(id, (e.loaded / e.total) * 100);
                    }
                }
            };

            xhr.onload = function() {
                if (xhr.status >= 200 && xhr.status < 300) {
                    resolve();
                    return;
                }

                try {
                    var data = JSON.parse(xhr.responseText);
                    reject(createApiErrorFromData(data, xhr.status, t('upload_failed')));
                } catch (e) {
                    reject(new Error(t('upload_failed')));
                }
            };

            xhr.onerror = function() {
                reject(createConnectionError());
            };

            xhr.send(formData);
        });
    }

    async function uploadFile(uploadEntry, conflictState, options) {
        options = options || {};
        var file = uploadEntry.file || uploadEntry;
        var relativePath = uploadEntry.relativePath || '';
        var displayName = uploadEntry.displayName || relativePath || file.name;
        var batchState = options.batchState || null;
        var ownsProgressItem = !options.progressId;
        var id = options.progressId || createUploadProgressItem(displayName, getUploadProgressTypeClass(file, relativePath, false));

        try {
            var conflictStrategy = normalizeConflictAction(conflictState && conflictState.action, null);

            while (true) {
                try {
                    await sendUploadRequest(id, file, relativePath, conflictStrategy, batchState && function(loaded) {
                        var totalBytes = batchState.totalBytes || 0;
                        var pct = totalBytes > 0
                            ? ((batchState.completedBytes + loaded) / totalBytes) * 100
                            : 0;
                        setUploadProgressPercent(id, pct);
                    });
                    if (batchState) {
                        batchState.completedBytes += file.size || 0;
                        setUploadProgressPercent(id, (batchState.completedBytes / (batchState.totalBytes || 1)) * 100);
                    } else {
                        updateUploadProgressState(id, 'done', 'success', 'complete');
                    }
                    if (!options.suppressSuccessToast) {
                        showToast(displayName + ' ' + t('uploaded'), 'success');
                    }
                    if (ownsProgressItem) {
                        setTimeout(function() {
                            var el = document.getElementById(id);
                            if (el) el.remove();
                        }, 3000);
                    }
                    return 'uploaded';
                } catch (err) {
                    if (err.code === 'destination_exists') {
                        var autoAction = normalizeConflictAction(conflictState && conflictState.action, err);
                        if (autoAction === 'skip') {
                            if (!batchState) {
                                updateUploadProgressState(id, 'skipped', 'info', 'skipped');
                                setTimeout(function() {
                                    var el = document.getElementById(id);
                                    if (el) el.remove();
                                }, 2500);
                            }
                            return 'skipped';
                        }
                        if (autoAction === 'replace' || autoAction === 'merge_replace') {
                            conflictStrategy = autoAction;
                            continue;
                        }

                        var decision = await requestConflictResolution(err, displayName);
                        var chosenAction = normalizeConflictAction(decision.action, err);
                        if (decision.applyToAll && chosenAction !== 'cancel' && conflictState) {
                            conflictState.action = chosenAction;
                        }

                        if (chosenAction === 'cancel') {
                            if (conflictState) {
                                conflictState.cancelled = true;
                            }
                            if (ownsProgressItem) {
                                var ownItem = document.getElementById(id);
                                if (ownItem) ownItem.remove();
                            }
                            return 'cancelled';
                        }

                        if (chosenAction === 'skip') {
                            if (!batchState) {
                                updateUploadProgressState(id, 'skipped', 'info', 'skipped');
                                setTimeout(function() {
                                    var el = document.getElementById(id);
                                    if (el) el.remove();
                                }, 2500);
                            }
                            return 'skipped';
                        }

                        conflictStrategy = chosenAction;
                        continue;
                    }

                    if (!batchState) {
                        updateUploadProgressState(id, 'failed', 'error', 'error');
                    }
                    if (!options.suppressErrorToast) {
                        showToast(t('upload_failed') + ' ' + displayName + ': ' + err.message, 'error');
                    }
                    return 'failed';
                }
            }
        } catch (err) {
            if (!batchState) {
                updateUploadProgressState(id, 'failed', 'error', 'error');
            }
            if (!options.suppressErrorToast) {
                showToast(t('upload_failed') + ' ' + displayName + ': ' + err.message, 'error');
            }
            return 'failed';
        }
    }

    // Drag and drop
    var dropzone = document.getElementById('dropzone');
    var dropContainer = document.getElementById('dropzoneContainer');

    document.addEventListener('dragover', function(e) {
        e.preventDefault();
        if (!uploadZoneVisible) {
            uploadZoneVisible = true;
            dropzone.classList.add('visible');
        }
        dropzone.classList.add('active');
    });

    document.addEventListener('dragleave', function(e) {
        if (e.relatedTarget === null || !document.contains(e.relatedTarget)) {
            dropzone.classList.remove('active');
        }
    });

    document.addEventListener('drop', function(e) {
        e.preventDefault();
        dropzone.classList.remove('active');
        if (e.dataTransfer.files.length > 0) {
            handleFileSelect(e.dataTransfer.files);
        }
    });

    window.addEventListener('scroll', function() {
        cancelPendingLongPress();
    }, { passive: true });

    // ===== Sort & Filter =====
    window.onSortChange = function() {
        var val = document.getElementById('sortSelect').value;
        var parts = val.split('-');
        applySort(parts[0], parts[1] || 'asc');
    };

    window.sortByColumn = function(sortKey) {
        var nextOrder;
        if (sortKey === currentSort) {
            if (sortKey === 'type') {
                nextOrder = 'asc';
            } else {
                nextOrder = currentOrder === 'asc' ? 'desc' : 'asc';
            }
        } else if (sortKey === 'date' || sortKey === 'size') {
            nextOrder = 'desc';
        } else {
            nextOrder = 'asc';
        }
        applySort(sortKey, nextOrder);
    };

    window.onFilterChange = function() {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(function() {
            currentFilter = document.getElementById('searchInput').value;
            loadFiles();
        }, 250);
    };

    // ===== Modal =====
    function showModal(title, defaultValue, confirmText, callback) {
        modalCallback = callback;
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalInput').value = defaultValue;
        setModalConfirmButton(confirmText);
        document.getElementById('modalOverlay').classList.add('open');
        setTimeout(function() {
            var input = document.getElementById('modalInput');
            input.focus();
            input.select();
        }, 100);
    }

    window.hideModal = function() {
        document.getElementById('modalOverlay').classList.remove('open');
        modalCallback = null;
        restoreModalInput();
    };

    window.closeBasicModalButton = function(event) {
        if (event) event.stopPropagation();
        hideModal();
    };

    window.closeModal = function(e) {
        if (e.target === document.getElementById('modalOverlay')) hideModal();
    };

    window.confirmModal = function() {
        var value = document.getElementById('modalInput').value.trim();
        var cb = modalCallback;
        hideModal();
        if (cb) {
            cb(value);
        }
    };

    // ===== Confirm Dialog =====
    function showConfirm(title, message, btnText, callback, showSdr) {
        confirmCallback = callback;
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        document.getElementById('confirmBtn').textContent = btnText;
        document.getElementById('confirmCancelBtn').textContent = t('cancel');
        var sdrOption = document.getElementById('confirmSdrOption');
        var sdrCheckbox = document.getElementById('confirmSdrCheckbox');
        if (showSdr) {
            document.getElementById('confirmSdrLabel').textContent = t('also_delete_sdr');
            sdrCheckbox.checked = true;
            sdrOption.style.display = 'flex';
        } else {
            sdrOption.style.display = 'none';
            sdrCheckbox.checked = false;
        }
        document.getElementById('confirmOverlay').classList.add('open');
    }

    window.hideConfirm = function() {
        document.getElementById('confirmOverlay').classList.remove('open');
        confirmCallback = null;
    };

    window.closeConfirm = function(e) {
        if (e.target === document.getElementById('confirmOverlay')) hideConfirm();
    };

    window.doConfirm = function() {
        var cb = confirmCallback;
        hideConfirm();
        if (cb) {
            cb();
        }
    };

    function hideConflictDialog() {
        document.getElementById('conflictOverlay').classList.remove('open');
        document.getElementById('conflictActions').innerHTML = '';
        conflictResolver = null;
    }

    function resolveConflictDialog(action) {
        var resolver = conflictResolver;
        var applyToAll = document.getElementById('conflictApplyAll').checked;
        hideConflictDialog();
        if (resolver) {
            resolver({
                action: action,
                applyToAll: applyToAll
            });
        }
    }

    function showConflictDialog(options) {
        return new Promise(function(resolve) {
            conflictResolver = resolve;

            document.getElementById('conflictTitle').textContent = options.title;
            document.getElementById('conflictMessageText').textContent = options.message;
            document.getElementById('conflictApplyText').textContent = options.applyAllLabel || t('conflict_apply_all');
            document.getElementById('conflictApplyAll').checked = false;

            var actionsEl = document.getElementById('conflictActions');
            actionsEl.innerHTML = '';

            for (var i = 0; i < options.actions.length; i++) {
                (function(action) {
                    var btn = document.createElement('button');
                    btn.className = action.className;
                    btn.type = 'button';
                    btn.textContent = action.label;
                    btn.addEventListener('click', function() {
                        resolveConflictDialog(action.id);
                    });
                    actionsEl.appendChild(btn);
                })(options.actions[i]);
            }

            document.getElementById('conflictOverlay').classList.add('open');
        });
    }

    window.closeConflictDialogButton = function(event) {
        if (event) event.stopPropagation();
        resolveConflictDialog('cancel');
    };

    window.closeConflictOverlay = function(e) {
        if (e.target === document.getElementById('conflictOverlay')) {
            resolveConflictDialog('cancel');
        }
    };

    function normalizeConflictAction(action, err) {
        if (action === 'merge_replace' && !(err && err.canMerge)) {
            return 'replace';
        }
        return action;
    }

    async function requestConflictResolution(err, displayName) {
        var itemName = displayName || getPathName(err && err.destinationPath) || t('unknown');
        var isFolderConflict = err && (err.sourceType === 'directory' || err.destinationType === 'directory');
        var message = t(isFolderConflict ? 'conflict_folder_message' : 'conflict_file_message').replace('{name}', itemName);
        message += '\n\n' + t(err && err.canMerge ? 'conflict_merge_hint' : 'conflict_replace_hint');

        var actions = [
            { id: 'skip', label: t('skip_item'), className: 'btn btn-skip' },
            { id: 'replace', label: t('replace_existing'), className: 'btn btn-danger' }
        ];

        if (err && err.canMerge) {
            actions.push({
                id: 'merge_replace',
                label: t('merge_replace'),
                className: 'btn btn-primary'
            });
        }

        return showConflictDialog({
            title: t(isFolderConflict ? 'conflict_folder_title' : 'conflict_file_title'),
            message: message,
            applyAllLabel: t('conflict_apply_all'),
            actions: actions
        });
    }

    // ===== Toast =====
    function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('hiding');
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }

    // ===== Helpers =====
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
        if (!str) return '';
        return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function formatDate(timestamp) {
        if (!timestamp) return '';
        var d = new Date(timestamp * 1000);
        var now = new Date();
        var diff = now - d;
        if (diff < 60000) return t('just_now');
        if (diff < 3600000) return Math.floor(diff / 60000) + t('minutes_ago');
        if (diff < 86400000) return Math.floor(diff / 3600000) + t('hours_ago');
        if (diff < 604800000) return Math.floor(diff / 86400000) + t('days_ago');
        var months = t('month_names');
        if (!months || !months.length) {
            months = translations.en.month_names;
        }
        return months[d.getMonth()] + ' ' + d.getDate() + (d.getFullYear() !== now.getFullYear() ? ', ' + d.getFullYear() : '');
    }

    // ===== History / popstate =====
    function _parsePathnameState() {
        var pathname = window.location.pathname || '/';
        var search = window.location.search || '';
        if (pathname === '/' || pathname === '/index.html') {
            return null;
        }

        var scope = null;
        var routePath = null;
        if (pathname === '/files' || pathname.indexOf('/files/') === 0) {
            scope = 'storage';
            routePath = pathname.substring('/files'.length) || '/';
        } else if (pathname === '/system' || pathname.indexOf('/system/') === 0) {
            scope = 'system';
            routePath = pathname.substring('/system'.length) || '/';
        } else {
            return null;
        }

        var directoryPath = decodeRoutePath(routePath);
        var params = new URLSearchParams(search);
        var detailName = params.get('detail');
        if (detailName) {
            detailName = detailName.replace(/^\/+|\/+$/g, '');
            if (detailName) {
                return {
                    path: buildChildPath(directoryPath, detailName),
                    scope: scope,
                    detail: true
                };
            }
        }

        return {
            path: directoryPath,
            scope: scope,
            detail: false
        };
    }

    // Legacy hash parser kept for backward compatibility with older shared links.
    function _parseLegacyHash() {
        var hash = window.location.hash;
        if (!hash || hash === '#' || hash === '#/') {
            return { path: '/', scope: currentScope || defaultScope || 'storage', detail: false };
        }

        var raw = hash.substring(1);
        if (raw.indexOf('path=') !== -1 || raw.indexOf('scope=') !== -1 || raw.indexOf('detail=') !== -1) {
            var params = new URLSearchParams(raw);
            return {
                path: params.get('path') || '/',
                scope: params.get('scope') || currentScope || defaultScope || 'storage',
                detail: params.get('detail') === '1' || params.get('detail') === 'true'
            };
        }

        try {
            raw = decodeURIComponent(raw);
        } catch (e) {}
        if (raw.endsWith('!detail')) {
            return {
                path: raw.substring(0, raw.length - 7) || '/',
                scope: currentScope || defaultScope || 'storage',
                detail: true
            };
        }
        return {
            path: raw || '/',
            scope: currentScope || defaultScope || 'storage',
            detail: false
        };
    }

    function _parseLocationState() {
        return _parsePathnameState() || _parseLegacyHash();
    }

    window.addEventListener('popstate', function(event) {
        var parsedState = event.state || _parseLocationState();
        var state = normalizeNavigationTarget(parsedState.path, parsedState.scope, parsedState.detail);
        if (state.detail) {
            // If navigating to a detail view and we're already showing it, skip
            if (currentDetailEntry && currentDetailEntry.path === state.path && currentScope === state.scope) return;
            // We might need to navigate to the parent directory first to load entries
            var parentPath = getParentPath(state.path);
            if (currentPath !== parentPath || currentScope !== state.scope) {
                // Need to load the directory first, then show detail once loaded
                currentPath = parentPath;
                currentScope = state.scope;
                currentFilter = '';
                document.getElementById('searchInput').value = '';
                showHiddenFiles = false;
                ensureNavigationState();
                updateParentNav();
                updateNavigationContextUI();
                var params = new URLSearchParams({
                    path: currentPath,
                    scope: currentScope,
                    sort: currentSort,
                    order: currentOrder,
                    filter: currentFilter
                });
                api('GET', '/api/files?' + params).then(function(data) {
                    updateNavigationContextFromResponse(data);
                    renderBreadcrumbs(data.breadcrumbs);
                    renderFiles(data.entries);
                    _showDetailInternal(state.path);
                }).catch(function(err) {
                    if (isAuthSessionInvalidError(err) && err.handled) return;
                    // If loading fails, just navigate to the directory
                    _navigateInternal(parentPath, state.scope);
                });
            } else {
                _showDetailInternal(state.path);
            }
        } else {
            // Navigating to a directory — close detail if open
            if (currentDetailEntry) {
                _hideDetailInternal();
            }
            _navigateInternal(state.path, state.scope);
        }
    });

    // ===== Init =====
    // Read pathname/hash to determine initial state before loading
    var initState = _parseLocationState();
    currentScope = initState.scope || currentScope;
    if (initState.detail) {
        // For detail view, start at the parent directory
        var initParent = getParentPath(initState.path);
        currentPath = initParent;
    } else {
        currentPath = initState.path;
    }
    // Set the initial history entry (replaceState so we don't add an extra entry)
    history.replaceState(
        initState.detail
            ? { path: initState.path, scope: currentScope, detail: true }
            : { path: currentPath, scope: currentScope, detail: false },
        '',
        buildHistoryURL(initState.detail ? initState.path : currentPath, currentScope, initState.detail)
    );

    // Fetch language setting from server, then apply translations and load files
    var _initDetailPath = initState.detail ? initState.path : null;
    var _initDetailScope = initState.scope || currentScope;
    fetch('/api/lang')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data && data.lang) {
                // Try exact match first, then prefix match (e.g. "zh_CN" -> "zh")
                if (translations[data.lang]) {
                    currentLang = data.lang;
                } else {
                    var prefix = data.lang.split('_')[0];
                    if (translations[prefix]) {
                        currentLang = prefix;
                    }
                }
            }
        })
        .catch(function() {
            // Keep English as default
        })
        .then(function() {
            initTheme();
            applyStaticTranslations();
            return initializeAuthState();
        })
        .then(function() {
            if (_initDetailPath) {
                if (rootUnlocked) {
                    _initDetailPath = _initDetailScope === 'system'
                        ? normalizeAbsolutePath(_initDetailPath)
                        : toRootScopePath(_initDetailPath);
                    _initDetailScope = 'system';
                } else if (_initDetailScope === 'system') {
                    _initDetailPath = toSafeScopePath(_initDetailPath);
                    _initDetailScope = 'storage';
                }
            }

            if (_initDetailPath && currentScope === _initDetailScope) {
                history.replaceState(
                    { path: _initDetailPath, scope: currentScope, detail: true },
                    '',
                    buildHistoryURL(_initDetailPath, currentScope, true)
                );
            } else {
                replaceCurrentHistoryState(false);
            }
            return loadFiles();
        })
        .then(function() {
            // After files are loaded, open detail view if hash indicated one
            if (_initDetailPath && currentScope === _initDetailScope) {
                _showDetailInternal(_initDetailPath);
            }
        });
})();
