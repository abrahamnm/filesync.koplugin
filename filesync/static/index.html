    function processSelectedUploads(files, preserveRelativePath) {

    async function uploadFile(uploadEntry) {
        var file = uploadEntry.file || uploadEntry;
        var relativePath = uploadEntry.relativePath || '';
        var displayName = uploadEntry.displayName || relativePath || file.name;
        var container = document.getElementById('uploadProgress');
        var id = 'upload-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8);

        var item = document.createElement('div');
        item.className = 'upload-item';
        item.id = id;
        item.innerHTML = '<span class="upload-item-name">' + escapeHtml(displayName) + '</span>' +
            '<div class="progress-bar"><div class="progress-bar-fill" id="' + id + '-bar"></div></div>' +
            '<span class="upload-item-status" id="' + id + '-status">0%</span>';
        container.prepend(item);

        try {
            var formData = new FormData();
            formData.append('file', file);
            if (relativePath) {
                formData.append('relative_path', relativePath);
            }

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload?path=' + encodeURIComponent(currentPath) + '&scope=' + encodeURIComponent(currentScope));

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var pct = Math.round((e.loaded / e.total) * 100);
                    var bar = document.getElementById(id + '-bar');
                    var status = document.getElementById(id + '-status');
                    if (bar) bar.style.width = pct + '%';
                    if (status) status.textContent = pct + '%';
                }
            };

            await new Promise(function(resolve, reject) {
                xhr.onload = function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve();
                    } else {
                        try {
                            var d = JSON.parse(xhr.responseText);
                            reject(new Error(d.error || t('upload_failed')));
                        } catch(e) {
                            reject(new Error(t('upload_failed')));
                        }
                    }
                };
                xhr.onerror = function() { reject(new Error(t('network_error'))); };
                xhr.send(formData);
            });

            var bar = document.getElementById(id + '-bar');
            var status = document.getElementById(id + '-status');
            if (bar) { bar.style.width = '100%'; bar.classList.add('complete'); }
            if (status) { status.textContent = t('done'); status.classList.add('success'); }
            showToast(displayName + ' ' + t('uploaded'), 'success');
            closeUploadZone();
            loadFiles();

            setTimeout(function() {
                var el = document.getElementById(id);
                if (el) el.remove();
            }, 3000);

        } catch (err) {
            var bar2 = document.getElementById(id + '-bar');
            var status2 = document.getElementById(id + '-status');
            if (bar2) { bar2.style.width = '100%'; bar2.classList.add('error'); }
            if (status2) { status2.textContent = t('failed'); status2.classList.add('error'); }
            showToast(t('upload_failed') + ' ' + displayName + ': ' + err.message, 'error');
        }
    }

    // Drag and drop
    var dropzone = document.getElementById('dropzone');
    var dropContainer = document.getElementById('dropzoneContainer');

    document.addEventListener('dragover', function(e) {
        e.preventDefault();
        if (!uploadZoneVisible) {
            uploadZoneVisible = true;
            dropzone.classList.add('visible');
        }
        dropzone.classList.add('active');
    });

    document.addEventListener('dragleave', function(e) {
        if (e.relatedTarget === null || !document.contains(e.relatedTarget)) {
            dropzone.classList.remove('active');
        }
    });

    document.addEventListener('drop', function(e) {
        e.preventDefault();
        dropzone.classList.remove('active');
        if (e.dataTransfer.files.length > 0) {
            handleFileSelect(e.dataTransfer.files);
        }
    });

    window.addEventListener('scroll', function() {
        cancelPendingLongPress();
    }, { passive: true });

    // ===== Sort & Filter =====
    window.onSortChange = function() {
        var val = document.getElementById('sortSelect').value;
        var parts = val.split('-');
        currentSort = parts[0];
        currentOrder = parts[1] || 'asc';
        loadFiles();
    };

    window.onFilterChange = function() {
        clearTimeout(filterTimer);
        filterTimer = setTimeout(function() {
            currentFilter = document.getElementById('searchInput').value;
            loadFiles();
        }, 250);
    };

    // ===== Modal =====
    function showModal(title, defaultValue, confirmText, callback) {
        modalCallback = callback;
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalInput').value = defaultValue;
        document.getElementById('modalConfirm').textContent = confirmText;
        document.getElementById('modalCancelBtn').textContent = t('cancel');
        document.getElementById('modalOverlay').classList.add('open');
        setTimeout(function() {
            var input = document.getElementById('modalInput');
            input.focus();
            input.select();
        }, 100);
    }

    window.hideModal = function() {
        document.getElementById('modalOverlay').classList.remove('open');
        modalCallback = null;
        restoreModalInput();
    };

    window.closeModal = function(e) {
        if (e.target === document.getElementById('modalOverlay')) hideModal();
    };

    window.confirmModal = function() {
        var value = document.getElementById('modalInput').value.trim();
        var cb = modalCallback;
        hideModal();
        if (cb) {
            cb(value);
        }
    };

    // ===== Confirm Dialog =====
    function showConfirm(title, message, btnText, callback, showSdr) {
        confirmCallback = callback;
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        document.getElementById('confirmBtn').textContent = btnText;
        document.getElementById('confirmCancelBtn').textContent = t('cancel');
        var sdrOption = document.getElementById('confirmSdrOption');
        var sdrCheckbox = document.getElementById('confirmSdrCheckbox');
        if (showSdr) {
            document.getElementById('confirmSdrLabel').textContent = t('also_delete_sdr');
            sdrCheckbox.checked = true;
            sdrOption.style.display = 'flex';
        } else {
            sdrOption.style.display = 'none';
            sdrCheckbox.checked = false;
        }
        document.getElementById('confirmOverlay').classList.add('open');
    }

    window.hideConfirm = function() {
        document.getElementById('confirmOverlay').classList.remove('open');
        confirmCallback = null;
    };

    window.closeConfirm = function(e) {
        if (e.target === document.getElementById('confirmOverlay')) hideConfirm();
    };

    window.doConfirm = function() {
        var cb = confirmCallback;
        hideConfirm();
        if (cb) {
            cb();
        }
    };

    // ===== Toast =====
    function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('hiding');
            setTimeout(function() { toast.remove(); }, 300);
        }, 3000);
    }

    // ===== Helpers =====
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
        if (!str) return '';
        return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function formatDate(timestamp) {
        if (!timestamp) return '';
        var d = new Date(timestamp * 1000);
        var now = new Date();
        var diff = now - d;
        if (diff < 60000) return t('just_now');
        if (diff < 3600000) return Math.floor(diff / 60000) + t('minutes_ago');
        if (diff < 86400000) return Math.floor(diff / 3600000) + t('hours_ago');
        if (diff < 604800000) return Math.floor(diff / 86400000) + t('days_ago');
        var months = t('month_names');
        if (!months || !months.length) {
            months = translations.en.month_names;
        }
        return months[d.getMonth()] + ' ' + d.getDate() + (d.getFullYear() !== now.getFullYear() ? ', ' + d.getFullYear() : '');
    }

    // ===== History / popstate =====
    // Parse the current hash and return {path, scope, detail} without modifying state
    function _parseHash() {
        var hash = window.location.hash;
        if (!hash || hash === '#' || hash === '#/') {
            return { path: '/', scope: currentScope || defaultScope || 'storage', detail: false };
        }

        var raw = hash.substring(1);
        if (raw.indexOf('path=') !== -1 || raw.indexOf('scope=') !== -1 || raw.indexOf('detail=') !== -1) {
            var params = new URLSearchParams(raw);
            return {
                path: params.get('path') || '/',
                scope: params.get('scope') || currentScope || defaultScope || 'storage',
                detail: params.get('detail') === '1' || params.get('detail') === 'true'
            };
        }

        try {
            raw = decodeURIComponent(raw);
        } catch (e) {}
        if (raw.endsWith('!detail')) {
            return {
                path: raw.substring(0, raw.length - 7) || '/',
                scope: currentScope || defaultScope || 'storage',
                detail: true
            };
        }
        return {
            path: raw || '/',
            scope: currentScope || defaultScope || 'storage',
            detail: false
        };
    }

    window.addEventListener('popstate', function(event) {
        var parsedState = event.state || _parseHash();
        var state = normalizeNavigationTarget(parsedState.path, parsedState.scope, parsedState.detail);
        if (state.detail) {
            // If navigating to a detail view and we're already showing it, skip
            if (currentDetailEntry && currentDetailEntry.path === state.path && currentScope === state.scope) return;
            // We might need to navigate to the parent directory first to load entries
            var parentPath = getParentPath(state.path);
            if (currentPath !== parentPath || currentScope !== state.scope) {
                // Need to load the directory first, then show detail once loaded
                currentPath = parentPath;
                currentScope = state.scope;
                currentFilter = '';
                document.getElementById('searchInput').value = '';
                showHiddenFiles = false;
                ensureNavigationState();
                updateParentNav();
                updateNavigationContextUI();
                var params = new URLSearchParams({
                    path: currentPath,
                    scope: currentScope,
                    sort: currentSort,
                    order: currentOrder,
                    filter: currentFilter
                });
                api('GET', '/api/files?' + params).then(function(data) {
                    updateNavigationContextFromResponse(data);
                    renderBreadcrumbs(data.breadcrumbs);
                    renderFiles(data.entries);
                    _showDetailInternal(state.path);
                }).catch(function() {
                    // If loading fails, just navigate to the directory
                    _navigateInternal(parentPath, state.scope);
                });
            } else {
                _showDetailInternal(state.path);
            }
        } else {
            // Navigating to a directory — close detail if open
            if (currentDetailEntry) {
                _hideDetailInternal();
            }
            _navigateInternal(state.path, state.scope);
        }
    });

    // ===== Init =====
    // Read hash to determine initial state before loading
    var initState = _parseHash();
    currentScope = initState.scope || currentScope;
    if (initState.detail) {
        // For detail view, start at the parent directory
        var initParent = getParentPath(initState.path);
        currentPath = initParent;
    } else {
        currentPath = initState.path;
    }
    // Set the initial history entry (replaceState so we don't add an extra entry)
    history.replaceState(
        initState.detail
            ? { path: initState.path, scope: currentScope, detail: true }
            : { path: currentPath, scope: currentScope, detail: false },
        '',
        window.location.hash || buildHistoryHash(currentPath, currentScope, initState.detail)
    );

    // Fetch language setting from server, then apply translations and load files
    var _initDetailPath = initState.detail ? initState.path : null;
    var _initDetailScope = initState.scope || currentScope;
    fetch('/api/lang')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data && data.lang && translations[data.lang]) {
                currentLang = data.lang;
            }
        })
        .catch(function() {
            // Keep English as default
        })
        .then(function() {
            applyStaticTranslations();
            return initializeAuthState();
        })
        .then(function() {
            if (_initDetailPath && currentScope === _initDetailScope) {
                history.replaceState(
                    { path: _initDetailPath, scope: currentScope, detail: true },
                    '',
                    buildHistoryHash(_initDetailPath, currentScope, true)
                );
            } else {
                replaceCurrentHistoryState(false);
            }
            return loadFiles();
        })
        .then(function() {
            // After files are loaded, open detail view if hash indicated one
            if (_initDetailPath && currentScope === _initDetailScope) {
                _showDetailInternal(_initDetailPath);
            }
        });
})();
</script>
</body>
</html>
